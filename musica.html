<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🎏<span>Arleidis</span></h1>

            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="peliculas.html" class="nav-link">Movies</a>
                <a href="juegos.html" class="nav-link">Games</a>

                <a href="mangas.html" class="nav-link">Manga</a>

    <main>

        <section id="musica" class="module active">

            <div class="module-hero orange">
                <h2>My Music</h2>
            </div>

            <div class="music-grid">

                <article class="music-card">
                    <div class="music-cover">
                        <img src="img/lemonboy.jpg" alt="lemonboy">
                    </div>

                    <div class="music-info">
                        <h4>My Favorite Song</h4>
                        <p>
                           Lemon Boy - Cavetown
                        </p>
                    </div>
                </article>

                <article class="music-card">
                    <div class="music-cover">
                        <img src="img/thefray.jpg" alt="thefray">
                    </div>

                    <div class="music-info">
                        <h4>Personal Classic</h4>
                        <p>
                           How to Save a Life - The Fray
                        </p>
                    </div>
                </article>

                <article class="music-card">
                    <div class="music-cover">
                        <img src="img/juliet.jpg" alt="juliet">
                    </div>

                    <div class="music-info">
                        <h4>For Relaxing</h4>
                        <p>
                           Juliet - Cavetown
                        </p>
                    </div>
                </article>

            </div>
